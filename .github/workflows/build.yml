name: Build iTVT App

on:
  push:
    branches: [main]
    tags:
      - "v*-debug"
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: false
        default: ""

permissions:
  contents: write

env:
  APP_NAME: iTVT
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - name: Install frontend dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile
      - name: Build Tauri (Windows)
        shell: pwsh
        run: pnpm tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      - name: Build portable ZIP
        shell: pwsh
        run: |
          $exe = "src-tauri/target/release/desktop-app.exe"
          if (Test-Path $exe) { Compress-Archive -Path $exe -DestinationPath "iTVT-portable-win64.zip" }
      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging/windows/nsis
          New-Item -ItemType Directory -Force -Path staging/windows/msi
          New-Item -ItemType Directory -Force -Path staging/windows/portable
          Copy-Item "src-tauri/target/release/bundle/nsis/*.exe" staging/windows/nsis/ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri/target/release/bundle/msi/*.msi" staging/windows/msi/ -ErrorAction SilentlyContinue
          Copy-Item "iTVT-portable-win64.zip" staging/windows/portable/ -ErrorAction SilentlyContinue
      - uses: actions/upload-artifact@v4
        with:
          name: itvt-windows
          path: staging/windows/*/*

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-apple-darwin }
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      - name: Stage macOS artifacts
        run: |
          mkdir -p staging/macos/dmg
          cp src-tauri/target/release/bundle/dmg/*.dmg staging/macos/dmg/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: itvt-macos-arm
          path: staging/macos/*/*

  build-macos-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-apple-darwin }
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      - name: Stage macOS artifacts
        run: |
          mkdir -p staging/macos/dmg
          cp src-tauri/target/release/bundle/dmg/*.dmg staging/macos/dmg/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: itvt-macos-intel
          path: staging/macos/*/*

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update && sudo apt-get install -y \
            pkg-config libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libfuse2 libunwind-dev \
            xdg-utils \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly gstreamer1.0-libav
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - name: Build (x86)
        env:
          GSTREAMER_INCLUDE_BAD_PLUGINS: "1"
        run: |
          pnpm tauri build
      - name: Stage Linux x86 artifacts
        run: |
          mkdir -p staging/linux-x86/deb staging/linux-x86/appimage
          cp src-tauri/target/release/bundle/deb/*.deb staging/linux-x86/deb/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage staging/linux-x86/appimage/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: itvt-linux-x86
          path: staging/linux-x86/*/*

  build-linux-nix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - name: Build with Nix
        run: |
          nix-shell --run "pnpm tauri build"
      - name: Stage Nix artifacts
        run: |
          mkdir -p staging/linux-nix
          cp src-tauri/target/release/bundle/deb/*.deb staging/linux-nix/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage staging/linux-nix/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/rpm/*.rpm staging/linux-nix/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: itvt-linux-nix
          path: staging/linux-nix/*

  build-linux-arm-22:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (ARM22)
        run: |
          sudo apt-get update && sudo apt-get install -y \
            pkg-config libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            librsvg2-dev libfuse2 libunwind-dev \
            xdg-utils \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly gstreamer1.0-libav
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build || (echo "AppImage bundling may have failed, but deb/rpm artifacts are still uploaded" && ls src-tauri/target/release/bundle/deb/*.deb 2>/dev/null)
      - name: Stage Linux ARM22 artifacts
        run: |
          mkdir -p staging/linux-arm22/deb staging/linux-arm22/appimage staging/linux-arm22/rpm
          cp src-tauri/target/release/bundle/deb/*.deb staging/linux-arm22/deb/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage staging/linux-arm22/appimage/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/rpm/*.rpm staging/linux-arm22/rpm/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: itvt-linux-arm22
          path: staging/linux-arm22/*/*

  build-linux-arm-24:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (ARM24)
        run: |
          sudo apt-get update && sudo apt-get install -y \
            pkg-config libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            librsvg2-dev libfuse2 libunwind-dev \
            xdg-utils \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly gstreamer1.0-libav
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build || (echo "AppImage bundling may have failed, but deb/rpm artifacts are still uploaded" && ls src-tauri/target/release/bundle/deb/*.deb 2>/dev/null)
      - name: Stage Linux ARM24 artifacts
        run: |
          mkdir -p staging/linux-arm24/deb staging/linux-arm24/appimage staging/linux-arm24/rpm
          cp src-tauri/target/release/bundle/deb/*.deb staging/linux-arm24/deb/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage staging/linux-arm24/appimage/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/rpm/*.rpm staging/linux-arm24/rpm/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: itvt-linux-arm24
          path: staging/linux-arm24/*/*

  release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [build-windows, build-macos-arm, build-macos-intel, build-linux, build-linux-nix, build-linux-arm-22, build-linux-arm-24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag and prerelease
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.ref_name }}"
            echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
            if echo "$TAG" | grep -q '\-debug'; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.tag_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/itvt-windows/**/*
            artifacts/itvt-macos-arm/**/*
            artifacts/itvt-macos-intel/**/*
            artifacts/itvt-linux-x86/**/*
            artifacts/itvt-linux-nix/**/*
            artifacts/itvt-linux-arm22/**/*
            artifacts/itvt-linux-arm24/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
