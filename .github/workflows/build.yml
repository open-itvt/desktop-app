name: Build iTVT App

on:
  push:
    branches: [main]
    tags:
      - "appv*-debug"
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: false
        default: ""

permissions:
  contents: write

env:
  APP_NAME: iTVT

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - name: Install frontend dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile
      - name: Build Tauri (Windows)
        shell: pwsh
        run: pnpm tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      - name: Build portable ZIP
        shell: pwsh
        run: |
          $exe = "src-tauri/target/release/desktop-app.exe"
          if (Test-Path $exe) { Compress-Archive -Path $exe -DestinationPath "iTVT-portable-win64.zip" }
      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging/windows/nsis
          New-Item -ItemType Directory -Force -Path staging/windows/msi
          New-Item -ItemType Directory -Force -Path staging/windows/portable
          Copy-Item "src-tauri/target/release/bundle/nsis/*.exe" staging/windows/nsis/ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri/target/release/bundle/msi/*.msi" staging/windows/msi/ -ErrorAction SilentlyContinue
          Copy-Item "iTVT-portable-win64.zip" staging/windows/portable/ -ErrorAction SilentlyContinue
      - uses: actions/upload-artifact@v4
        with:
          name: itvt-windows
          path: staging/windows/*

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-apple-darwin }
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      - name: Stage macOS artifacts
        run: |
          mkdir -p staging/macos/dmg
          cp src-tauri/target/release/bundle/dmg/*.dmg staging/macos/dmg/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: itvt-macos-arm
          path: staging/macos/*

  build-macos-intel:

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update && sudo apt-get install -y \
            pkg-config libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libfuse2 libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly gstreamer1.0-libav
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build
      - name: Stage Linux artifacts
        run: |
          mkdir -p staging/linux/deb staging/linux/appimage
          cp src-tauri/target/release/bundle/deb/*.deb staging/linux/deb/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage staging/linux/appimage/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: itvt-linux
          path: staging/linux/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Determine prrelease flag
        id: meta
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -q '\-debug'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            itvt-windows/*
            itvt-macos/*
            itvt-linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
